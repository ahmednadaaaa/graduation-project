# ==============================================================================
# nginx.conf (Nginx Production Server Configuration)
# Copy to EC2: sudo cp deployment/nginx.conf /etc/nginx/sites-available/unitrack
# Enable site: sudo ln -s /etc/nginx/sites-available/unitrack /etc/nginx/sites-enabled/
# Remove default site: sudo rm /etc/nginx/sites-enabled/default
# Test config: sudo nginx -t
# Restart Nginx: sudo systemctl restart nginx
# ==============================================================================

server {
    listen 80;
    server_name unitrack.online www.unitrack.online;

    # Set maximum upload size (important for student profile pictures/face scans)
    client_max_body_size 20M;

    # 1. Serves Django/React Compiled Static Files
    location /static/ {
        alias /home/ubuntu/unitrack/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # 2. Serves React compiled JS/CSS assets directly
    location /assets/ {
        alias /home/ubuntu/unitrack/frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # 3. Serves other React static files (favicon, robots, logo, etc.)
    location ~ ^/(loga\.ico|placeholder\.svg|robots\.txt)$ {
        root /home/ubuntu/unitrack/frontend/dist;
        expires 30d;
    }

    # 4. Serves User-uploaded Media (Face scans, etc.)
    location /media/ {
        alias /home/ubuntu/unitrack/media/;
        expires 30d;
    }

    # 5. Proxies standard API requests and React single-page routes to Daphne ASGI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSockets support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Request headers forwarding
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for persistent WebSockets connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
